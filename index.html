<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shoes DZ13 | متجر الأحذية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff6b00; --secondary: #001f3f; --dark: #0a0a0a; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--dark); color: var(--white); overflow-x: hidden; }

        header { background: linear-gradient(to bottom, var(--secondary), var(--dark)); padding: 50px 20px; text-align: center; border-bottom: 4px solid var(--primary); }
        .text-logo { font-size: 3rem; font-weight: 900; color: var(--primary); text-transform: uppercase; text-shadow: 3px 3px 0px var(--white); display: inline-block; }

        .social-section { background: #111; padding: 20px; text-align: center; }
        .social-links { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 500px; margin: 0 auto; }
        .btn-social { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px; border-radius: 10px; text-decoration: none; color: white; font-weight: bold; font-size: 0.9rem; }
        .phone { background: var(--primary); grid-column: span 2; font-size: 1.2rem; }
        .whatsapp { background: #25D366; } .instagram { background: #E4405F; } .tiktok { background: #000; border: 1px solid #444; } .facebook { background: #1877F2; }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 15px; padding: 20px; }
        .product-card { background: #1a1a1a; border-radius: 15px; overflow: hidden; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; }
        .product-info { padding: 12px; text-align: center; }
        .price { color: var(--primary); font-weight: 800; font-size: 1.2rem; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: #fff; color: #000; width: 100%; max-width: 400px; border-radius: 20px; overflow: hidden; position: relative; }
        .modal-content img { width: 100%; height: 300px; object-fit: cover; }
        .modal-body { padding: 20px; text-align: center; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .action-btn { padding: 14px; border-radius: 10px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; border: none; cursor: pointer; }
        .btn-wa { background: #25D366; color: white; grid-column: span 2; }
        .btn-call { background: var(--secondary); color: white; }
        .btn-copy { background: #eee; color: #333; }
        .close-modal { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; width: 35px; height: 35px; border-radius: 50%; line-height: 35px; text-align: center; cursor: pointer; }
        footer { text-align: center; padding: 40px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header>
        <div class="text-logo">My Shoes DZ13</div>
        <p style="margin-top:10px;">بيع الأحذية بالجملة - جلد طبيعي 100%</p>
    </header>

    <div class="social-section">
        <div class="social-links">
            <a href="tel:0559839046" class="btn-social phone"><i class="fas fa-phone"></i> اتصل للطلب: 0559839046</a>
            <a href="https://wa.me/213559839046" class="btn-social whatsapp"><i class="fab fa-whatsapp"></i> واتساب</a>
            <a href="https://www.facebook.com/share/1EWRxPgymQ/" class="btn-social facebook">فيسبوك</a>
            <a href="https://www.instagram.com/my.shoes.dz13" class="btn-social instagram">انستغرام</a>
            <a href="https://www.tiktok.com/@my.shoes.dz13" class="btn-social tiktok">تيك توك</a>
        </div>
    </div>

    <div class="products-grid" id="products"></div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="close-modal" onclick="closeModal()">&times;</div>
            <img id="modalImg" src="">
            <div class="modal-body">
                <h2 id="modalTitle"></h2>
                <div class="price" id="modalPrice"></div>
                <p id="modalCarton" style="margin: 8px 0; color: #666; font-weight: bold;"></p>
                <div class="btn-group">
                    <a id="waOrderBtn" href="#" class="action-btn btn-wa"><i class="fab fa-whatsapp"></i> اطلب للاستفسار</a>
                    <a href="tel:0559839046" class="action-btn btn-call"><i class="fas fa-phone"></i> اتصل</a>
                    <button onclick="copyLink()" class="action-btn btn-copy"><i class="fas fa-copy"></i> نسخ الرابط</button>
                </div>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 My Shoes DZ13</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjhKZ5zPX-Ij43qi9LlPcpE9GiCb5iHcw",
            authDomain: "myshoesdz-653b9.firebaseapp.com",
            projectId: "myshoesdz-653b9",
            storageBucket: "myshoesdz-653b9.firebasestorage.app",
            messagingSenderId: "80960425880",
            appId: "1:80960425880:web:9d79ddbb1e1286549b25ed"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const grid = document.getElementById('products');
            grid.innerHTML = "";
            snapshot.forEach((doc) => {
                const p = doc.data();
                const div = document.createElement('div');
                div.className = 'product-card';
                div.innerHTML = `<img src="${p.img}"><div class="product-info"><h3>${p.name}</h3><div class="price">${p.price}</div></div>`;
                div.onclick = () => openModal(p);
                grid.appendChild(div);
            });
        });

        window.openModal = (p) => {
            document.getElementById('modalImg').src = p.img;
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalPrice').innerText = p.price;
            document.getElementById('modalCarton').innerText = p.carton || "";
            document.getElementById('waOrderBtn').href = `https://wa.me/213559839046?text=مهتم بموديل: ${p.name}`;
            document.getElementById('productModal').style.display = 'flex';
        };
        window.closeModal = () => document.getElementById('productModal').style.display = 'none';
        window.copyLink = () => { navigator.clipboard.writeText(window.location.href); alert("تم نسخ الرابط!"); };
    </script>
</body>
</html>
